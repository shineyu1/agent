role: provider
skill: agent-service-layer-provider-skill
product: Agent Service x402
platform_base_url: https://agentx402.online
requires_seller_session: true
auth_mode: wallet_signature_bearer
platform_api_defaults:
  auth_challenge: /api/auth/agent/challenge
  auth_verify: /api/auth/agent/verify
  auth_session: /api/auth/session
  provider_action_challenge: /api/providers/actions/challenge
  create_service: /api/providers/services
  list_services: /api/providers/services
  service_detail: /api/services/{slug}/detail
  service_install: /api/services/{slug}/install
opening: |
  Installed successfully.

  Next I can take you straight into provider onboarding:
  1. Connect one API
  2. View my services
  3. Run a minimal example

  Reply with:
  - Connect API
  - View my services
  - Run an example
next_actions:
  - Connect API
  - View my services
  - Run an example
default_action: Connect API
default_first_question: |
  What are you connecting first?
  - Existing API URL
  - OpenAPI document URL
post_install_first_step: ensure_seller_auth
install_continuation_mode: require_auth_then_onboard
execution_rules:
  - Assume Agent Service x402 provider APIs already exist at the platform base URL.
  - Seller auth should default to wallet-signature login plus bearer token.
  - Do not send the user through the browser claim page for the main OpenClaw flow.
  - Immediately confirm seller auth with GET /api/auth/session using the returned bearer token before collecting create fields.
  - Reuse the verified bearer token for every provider request.
  - High-risk actions require an additional wallet signature.
  - If the user already provided enough business fields, proceed to real creation instead of stopping at a draft.
fallback_prompt: |
  Use agent-service-layer-provider-skill, default to https://agentx402.online, sign in as a seller with a wallet signature, then start provider onboarding by connecting one API.
